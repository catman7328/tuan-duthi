<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ Hướng Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .bg-graph {
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .trait-btn.active {
        background-color: #fef3c7;
        border-color: #fbbf24;
        color: #92400e;
        font-weight: bold;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 bg-graph p-6">
    <div class="max-w-3xl mx-auto">
      <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">
          Hồ Sơ Hướng Nghiệp
        </h1>
        <p class="text-slate-500 italic">
          Khám phá tương lai dựa trên năng lực của bạn
        </p>
      </header>

      <form id="careerForm" class="bg-white rounded-3xl shadow-xl border p-8">
        <div class="mb-6">
          <label class="block text-sm font-bold text-slate-600 mb-2"
            >Năm sinh</label
          >
          <input
            type="number"
            id="inputYear"
            required
            min="1990"
            max="2015"
            placeholder="VD: 2006"
            class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
          />
        </div>

        <div class="mb-6 relative">
          <label class="block text-sm font-bold text-slate-600 mb-2"
            >Chọn tổ hợp môn</label
          >
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm kiếm khối (A00, B00...)"
            class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
          />
          <ul
            id="dropdownList"
            class="absolute z-20 w-full mt-2 bg-white border rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"
          ></ul>

          <div
            id="selectedBlockDisplay"
            class="mt-4 hidden p-4 bg-blue-50 border border-blue-200 rounded-xl flex justify-between items-center"
          >
            <div>
              <span id="displayCode" class="font-bold text-blue-600 mr-2"></span
              ><span id="displaySubjects" class="text-sm"></span>
            </div>
            <button
              type="button"
              onclick="clearSelection()"
              class="text-red-500"
            >
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-bold text-slate-600 mb-4"
            >Tính cách đặc trưng (Chọn 2)</label
          >
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button
              type="button"
              onclick="toggleTrait('logic')"
              id="trait-logic"
              class="trait-btn p-4 border rounded-xl bg-white flex flex-col items-center transition"
            >
              <i class="fa-solid fa-brain mb-2 text-indigo-500"></i
              ><span class="text-xs">Logic</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('creative')"
              id="trait-creative"
              class="trait-btn p-4 border rounded-xl bg-white flex flex-col items-center transition"
            >
              <i class="fa-solid fa-lightbulb mb-2 text-amber-500"></i
              ><span class="text-xs">Sáng tạo</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('social')"
              id="trait-social"
              class="trait-btn p-4 border rounded-xl bg-white flex flex-col items-center transition"
            >
              <i class="fa-solid fa-users mb-2 text-emerald-500"></i
              ><span class="text-xs">Giao tiếp</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('detail')"
              id="trait-detail"
              class="trait-btn p-4 border rounded-xl bg-white flex flex-col items-center transition"
            >
              <i class="fa-solid fa-check-double mb-2 text-rose-500"></i
              ><span class="text-xs">Tỉ mỉ</span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg"
        >
          Phân tích Ngành Nghề
          <i class="fa-solid fa-wand-magic-sparkles ml-2"></i>
        </button>
        <p
          id="errorMsg"
          class="text-red-500 text-sm mt-3 text-center hidden font-medium"
        >
          Vui lòng chọn khối thi và tính cách!
        </p>
      </form>
    </div>
    <script src="./js.js"></script>
  </body>
</html>
