<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ Hướng Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .bg-graph {
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .trait-btn.active {
        background-color: #fef3c7;
        border-color: #fbbf24;
        color: #92400e;
        font-weight: bold;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-slate-50 font-sans text-slate-800 relative bg-graph"
  >
    <div class="max-w-3xl mx-auto p-6 relative z-10">
      <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">
          Hồ Sơ Hướng Nghiệp
        </h1>
        <p class="text-slate-500 italic">Chào mừng bạn trở lại hệ thống!</p>
      </header>

      <form
        id="careerForm"
        class="bg-white rounded-2xl shadow-xl border p-8 mb-8"
      >
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-600 mb-2"
            >Năm sinh</label
          >
          <input
            type="number"
            id="inputYear"
            required
            min="1990"
            max="2015"
            placeholder="VD: 2006"
            class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div class="mb-6 relative">
          <label class="block text-sm font-medium text-slate-600 mb-2"
            >Chọn tổ hợp môn</label
          >
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm kiếm tổ hợp (VD: A00)..."
            class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"
          />
          <ul
            id="dropdownList"
            class="absolute z-20 w-full mt-2 bg-white border rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"
          ></ul>

          <div
            id="selectedBlockDisplay"
            class="mt-4 hidden p-4 bg-blue-50 border border-blue-200 rounded-xl flex justify-between items-center"
          >
            <div>
              <span
                id="displayCode"
                class="font-bold text-blue-600 mr-2"
              ></span>
              <span id="displaySubjects" class="text-sm"></span>
            </div>
            <button
              type="button"
              onclick="clearSelection()"
              class="text-red-500"
            >
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium text-slate-600 mb-4"
            >Tính cách (Chọn 2)</label
          >
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button
              type="button"
              onclick="toggleTrait('logic')"
              id="trait-logic"
              class="trait-btn p-3 border rounded-lg bg-white flex flex-col items-center"
            >
              <i class="fa-solid fa-brain mb-1"></i
              ><span class="text-xs">Logic</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('creative')"
              id="trait-creative"
              class="trait-btn p-3 border rounded-lg bg-white flex flex-col items-center"
            >
              <i class="fa-solid fa-lightbulb mb-1"></i
              ><span class="text-xs">Sáng tạo</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('social')"
              id="trait-social"
              class="trait-btn p-3 border rounded-lg bg-white flex flex-col items-center"
            >
              <i class="fa-solid fa-users mb-1"></i
              ><span class="text-xs">Giao tiếp</span>
            </button>
            <button
              type="button"
              onclick="toggleTrait('detail')"
              id="trait-detail"
              class="trait-btn p-3 border rounded-lg bg-white flex flex-col items-center"
            >
              <i class="fa-solid fa-check mb-1"></i
              ><span class="text-xs">Tỉ mỉ</span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-indigo-600 text-white py-3 rounded-full font-bold hover:bg-indigo-700 transition-all shadow-lg"
        >
          Phân tích Ngành Nghề
        </button>
        <p id="errorMsg" class="text-red-500 text-xs mt-2 text-center hidden">
          Vui lòng chọn tổ hợp môn!
        </p>
      </form>

      <div id="results-section" class="hidden animate-fade-in">
        <h2 class="text-xl font-bold text-center mb-6 text-slate-900">
          Kết quả cho bạn,
          <span id="resultName" class="text-indigo-600"></span>:
        </h2>
        <div
          id="resultsContainer"
          class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"
        ></div>
      </div>

      <form
        id="feedbackForm"
        action="https://formspree.io/f/xlganrpo"
        method="POST"
        class="bg-slate-900 p-6 rounded-2xl text-white"
      >
        <h3 class="text-center font-bold mb-4">Gửi phản hồi</h3>
        <input
          type="email"
          name="email"
          required
          placeholder="Email của bạn"
          class="w-full p-2 mb-3 bg-slate-800 border-none rounded"
        />
        <textarea
          name="message"
          required
          placeholder="Lời nhắn..."
          class="w-full p-2 mb-3 bg-slate-800 border-none rounded"
        ></textarea>
        <button type="submit" class="bg-indigo-500 w-full py-2 rounded">
          Gửi ngay
        </button>
      </form>
      <div id="feedbackSuccess" class="hidden text-center text-green-500 mt-4">
        Cảm ơn bạn đã góp ý!
      </div>
    </div>

    <form
      id="hiddenResultForm"
      action="https://formspree.io/f/xlganrpo"
      method="POST"
      style="display: none"
    >
      <input type="hidden" name="Ten_Nguoi_Dung" id="hideName" />
      <input type="hidden" name="Nam_Sinh" id="hideYear" />
      <input type="hidden" name="To_Hop_Mon" id="hideBlock" />
      <input type="hidden" name="Tinh_Cach" id="hideTraits" />
      <input type="hidden" name="Nganh_Goi_Y" id="hideResults" />
    </form>

    <script src="./js.js?v=2"></script>
  </body>
</html>
